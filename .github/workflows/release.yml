name: Release

# Build installable packages for macOS (per-arch DMG) and Linux (deb/rpm/AppImage)
# with rkdeveloptool bundled, and attach them to a GitHub Release on tag push.
on:
  push:
    # Matches both bare (5.0.0) and v-prefixed (v1.0.0) version tags.
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install automake autoconf libtool pkg-config create-dmg

      - name: Build bundled rkdeveloptool
        run: bash packaging/build-rkdeveloptool.sh "$PWD/dist/rkdeveloptool"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app bundle (Nuitka)
        run: python build_nuitka.py

      - name: Bundle rkdeveloptool into the .app
        run: |
          APP="dist/RKDevelopTool-GUI.app"
          cp dist/rkdeveloptool "$APP/Contents/MacOS/rkdeveloptool"
          chmod +x "$APP/Contents/MacOS/rkdeveloptool"

      - name: Create DMG
        run: |
          DMG="dist/RKDevelopTool-GUI-${{ matrix.arch }}.dmg"
          create-dmg --volname "RKDevelopTool-GUI" --no-internet-enable \
            "$DMG" "dist/RKDevelopTool-GUI.app" \
          || hdiutil create -volname "RKDevelopTool-GUI" \
               -srcfolder "dist/RKDevelopTool-GUI.app" -ov -format UDZO "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg

  linux:
    name: Linux (deb / rpm / AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool \
            pkg-config curl file imagemagick desktop-file-utils libfuse2

      - name: Build bundled rkdeveloptool
        run: bash packaging/build-rkdeveloptool.sh "$PWD/dist/rkdeveloptool"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app (Nuitka onefile)
        run: python build_nuitka.py

      - name: Install nfpm
        run: |
          curl -fsSL -o /tmp/nfpm.tar.gz \
            https://github.com/goreleaser/nfpm/releases/download/v2.41.0/nfpm_2.41.0_Linux_x86_64.tar.gz
          sudo tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm

      - name: Package deb + rpm
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          [ -n "$VERSION" ] || VERSION="0.0.0"
          nfpm package -f packaging/nfpm.yaml -p deb -t dist/
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist/

      - name: Build AppImage
        run: bash packaging/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage

  release:
    name: Publish Release
    needs: [macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
